name: Deploy website to GitHub Pages

# Publishes the static site in website/ (plus the mkdocs-built API reference
# at website/api/) to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Build the API reference from docstrings into website/api/.
      # mkdocstrings imports the package, so install it (docs extras only).
      - name: Build API docs
        run: |
          pip install -e .
          pip install mkdocs-material "mkdocstrings[python]"
          mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
